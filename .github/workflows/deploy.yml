name: CI-CD Pipeline

on:
push:
branches:
- main

jobs:
test:
runs-on: ubuntu-latest

```
steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - run: |
      pip install -r requirements.txt
      PYTHONPATH=. pytest tests/
```

docker:
needs: test
runs-on: ubuntu-latest

```
permissions:
  contents: read
  packages: write

steps:
  - uses: actions/checkout@v4

  - name: Login to GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ secrets.GHCR_USERNAME }}
      password: ${{ secrets.GHCR_TOKEN }}

  - name: Build Image
    run: |
      docker build -t ghcr.io/dknova/dknova-app:latest .

  - name: Push Image
    run: |
      docker push ghcr.io/dknova/dknova-app:latest
```

