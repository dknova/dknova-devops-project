apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10m
      repeat_interval: 1h
      receiver: slack-notifications
    receivers:
      - name: slack-notifications
        slack_configs:
          - api_url: 'api_url: api_url: "REPLACE_WITH_SLACK_WEBHOOK"
            channel: '#new-channel'
            text: '{{ range .Alerts }}*{{ .Annotations.summary }}* {{ .Annotations.description }}\n{{ end }}'
