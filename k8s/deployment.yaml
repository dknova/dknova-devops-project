apiVersion: apps/v1
kind: Deployment

metadata:
  name: dknova-deployment
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: dknova-app

  template:
    metadata:
      labels:
        app: dknova-app

    spec:
      containers:
      - name: dknova-app
        image: dknova2/dknova-devops-app:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8000
